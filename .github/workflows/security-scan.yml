name: Security Scan

on:
  pull_request:

jobs:
  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          version: v0.70.0
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table
