<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#022c22"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>

  <!-- Phone body (centered, clean) -->
  <g>
    <rect x="144" y="80" width="224" height="352" rx="36" fill="#ecfdf5"/>
    <rect x="164" y="116" width="184" height="280" rx="14" fill="#022c22"/>
    <!-- Home indicator -->
    <rect x="226" y="410" width="60" height="8" rx="4" fill="#86efac"/>
    <!-- Speaker -->
    <rect x="228" y="98" width="56" height="6" rx="3" fill="#86efac" opacity="0.7"/>
  </g>

  <!-- Photo icon inside screen -->
  <g transform="translate(182, 160)">
    <rect x="0" y="0" width="148" height="132" rx="10" fill="#86efac"/>
    <!-- Sun/moon -->
    <circle cx="110" cy="36" r="14" fill="#fef3c7"/>
    <!-- Mountain silhouette -->
    <path d="M 0 132 L 0 96 L 42 62 L 80 90 L 108 74 L 148 106 L 148 132 Z" fill="#14532d"/>
  </g>

  <!-- Transfer arrows (three, indicating flow out) -->
  <g stroke="#86efac" stroke-width="14" stroke-linecap="round" fill="none">
    <path d="M 340 320 L 410 320" opacity="0.4"/>
    <path d="M 340 356 L 424 356" opacity="0.7"/>
    <path d="M 340 392 L 410 392" opacity="1"/>
    <!-- Arrowheads -->
    <path d="M 390 300 L 410 320 L 390 340" opacity="0.4"/>
    <path d="M 404 336 L 424 356 L 404 376" opacity="0.7"/>
    <path d="M 390 372 L 410 392 L 390 412" opacity="1"/>
  </g>
</svg>
